<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: sans-serif;
      background: #050505;
      color: white;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      border-bottom: 1px solid #222;
      padding-bottom: 8px;
    }
    .logo {
      color: #CCFF00;
      font-weight: bold;
      letter-spacing: 1px;
    }
    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .label {
      font-size: 10px;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .value {
      font-size: 18px;
      font-weight: bold;
    }
    .btn {
      background: #CCFF00;
      color: black;
      border: none;
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }
    .status {
      font-size: 10px;
      color: #CCFF00;
      display: flex;
      align-items: center;
      gap: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">HUNTER.LEASE</div>
    <div class="status">● LIVE AUDIT</div>
  </div>
  
  <div class="card">
    <div class="label">Detected Offer</div>
    <div class="value" id="price">$---</div>
  </div>

  <div class="card">
    <div class="label">Hunter Analysis</div>
    <div style="color: #FF4444; font-size: 12px; font-weight: bold;">⚠️ $2,400 Hidden Markup Found</div>
    <div style="font-size: 10px; color: #888; margin-top: 4px;">Dealer added "Protection Package" and "Market Adjustment".</div>
  </div>

  <button class="btn">AUDIT THIS DEAL</button>
  
  <div style="text-align: center; margin-top: 12px;">
    <a href="https://hunter.lease" target="_blank" style="color: #888; font-size: 10px; text-decoration: none;">Open Hunter.Lease Dashboard</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
